name: closetos_flutter
description: A high-fidelity mobile client for ClosetOS Wardrobe Operating System.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  google_fonts: ^6.1.0
  lucide_icons_flutter: ^3.1.14+2
  flutter_animate: ^4.5.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0
  http: ^1.6.0
  geolocator: ^14.0.3
  camera: ^0.12.0+1
  permission_handler: ^12.0.3
  flutter_image_compress: ^2.4.0
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^6.0.1
  supabase_flutter: ^2.15.2
  google_sign_in: ^7.2.0
  url_launcher: ^6.3.2
  image_picker: ^1.2.3
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  animations: ^2.2.0
  confetti: ^0.8.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/demo/
    - assets/images/
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
