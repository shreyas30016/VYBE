<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';

            font-style: normal;

            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        .glass-surface {
            background-color: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        }

        .ambient-glow {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(210,255,0,0.15) 0%, rgba(18,18,18,0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        body {
            background-color: #121212;
            color: #F5F5F7;
        }

        input {
            color: #F5F5F7 !important;
        }
        input::placeholder {

        }

            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-body-md">
<!-- Ambient Glow -->
<div class="ambient-glow"></div>
<main class="w-full max-w-md px-margin-mobile relative z-10 flex flex-col items-center justify-center min-h-[795px]">
<!-- Logo Area -->
<div class="mb-12 text-center w-full">
<h1 class="font-display-lg text-display-lg md:font-display-lg md:text-display-lg text-primary-container tracking-tight mb-bento-gap">ClosetOS</h1>
<h2 class="font-headline-md text-headline-md text-[#F5F5F7] mb-2" id="stateHeading">Welcome Back</h2>
<p class="text-[#8E8E93]">Your AI stylist is waiting</p>
</div>
<!-- Main Form Card -->
<div class="glass-surface w-full rounded-[32px] p-8">
<!-- Google Auth -->
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 rounded-full bg-[#1C1C1E] border border-[rgba(255,255,255,0.1)] hover:bg-[#2C2C2E] transition-all-custom group mb-6">
<svg fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-mono-accent text-mono-accent text-[#F5F5F7] group-hover:text-white">Continue with Google</span>
</button>
<!-- Divider -->
<div class="flex items-center justify-center gap-4 mb-6">
<div class="h-px bg-[rgba(255,255,255,0.1)] flex-1"></div>
<span class="font-label-caps text-label-caps text-[#8E8E93]">OR</span>
<div class="h-px bg-[rgba(255,255,255,0.1)] flex-1"></div>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-4" id="authForm">
<div class="relative">
<input class="w-full bg-[#1C1C1E] border border-[rgba(255,255,255,0.06)] rounded-[28px] px-6 py-4 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all-custom font-body-lg text-body-lg" id="email" placeholder="Email address" type="email"/>
</div>
<div class="relative">
<input class="w-full bg-[#1C1C1E] border border-[rgba(255,255,255,0.06)] rounded-[28px] px-6 py-4 pr-12 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all-custom font-body-lg text-body-lg" id="password" placeholder="Password" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#8E8E93] hover:text-[#F5F5F7] p-2" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end w-full mt-1 mb-4" id="forgotPasswordContainer">
<a class="text-sm text-[#8E8E93] hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-[#121212] rounded-full py-4 px-8 font-mono-accent text-mono-accent hover:opacity-90 hover:scale-[0.98] active:scale-[0.95] transition-all-custom shadow-[0_0_20px_rgba(210,255,0,0.2)] mt-2" id="submitBtn" type="submit">
                    Sign In
                </button>
</form>
</div>
<!-- Toggle State -->
<div class="mt-8 text-center">
<button class="text-[#8E8E93] hover:text-[#F5F5F7] transition-colors" id="toggleStateBtn">
                Don't have an account? <span class="text-primary-container">Sign Up</span>
</button>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            let isLoginState = true;
            const heading = document.getElementById('stateHeading');
            const submitBtn = document.getElementById('submitBtn');
            const toggleBtn = document.getElementById('toggleStateBtn');
            const forgotPasswordContainer = document.getElementById('forgotPasswordContainer');

            toggleBtn.addEventListener('click', () => {
                isLoginState = !isLoginState;
                
                if (isLoginState) {
                    heading.textContent = 'Welcome Back';
                    submitBtn.textContent = 'Sign In';
                    toggleBtn.innerHTML = `Don't have an account? <span class="text-primary-container">Sign Up</span>`;
                    forgotPasswordContainer.style.display = 'flex';
                } else {
                    heading.textContent = 'Create Your Closet';
                    submitBtn.textContent = 'Sign Up';
                    toggleBtn.innerHTML = `Already have an account? <span class="text-primary-container">Sign In</span>`;
                    forgotPasswordContainer.style.display = 'none';
                }
            });

            // Prevent form submit for demo
            document.getElementById('authForm').addEventListener('submit', (e) => {
                e.preventDefault();
            });
        });
    </script>
</body></html>
